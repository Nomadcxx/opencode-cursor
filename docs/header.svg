<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 828 191" width="828" height="191" role="img" aria-label="opencode-cursor">
  <style>
    text { font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace; white-space: pre; }
    .sweep { transform-origin: 48px 0; transform: scaleX(0); animation: sweep 800ms cubic-bezier(0.16,1,0.3,1) 300ms forwards; }
    .scan { animation: scan 3.8s cubic-bezier(0.45,0,0.55,1) 1.3s infinite; }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes sweep { to { transform: scaleX(1); } }
    @keyframes scan {
      0%   { transform: translateX(0); opacity: 0; }
      8%   { opacity: 1; }
      62%  { transform: translateX(732px); opacity: 1; }
      72%  { transform: translateX(732px); opacity: 0; }
      100% { transform: translateX(732px); opacity: 0; }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .reveal { clip-path: none !important; }
      .sweep { transform: scaleX(1) !important; }
      .shine { opacity: 0 !important; }
      .cur { transform: none !important; }
    }
  </style>
  <defs>
    <linearGradient id="ink_rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.55" stop-color="#ffffff"/><stop offset="1" stop-color="#808080"/>
    </linearGradient>
    <linearGradient id="scang_rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rc_rule"><rect x="48" y="137" width="732" height="6"/></clipPath>
  </defs>
  <rect fill="#000000" x="0" y="0" width="828" height="191" rx="8"/>
  <rect fill="none" stroke="#2a2a2a" stroke-width="1.5" x="14" y="14" width="800" height="163" rx="6"/>
  <rect fill="#000000" x="32" y="8" width="117" height="12"/>
  <text fill="#7a7a7a" x="38" y="19" font-size="12" xml:space="preserve">opencode-cursor</text>
  <text fill="url(#ink_rule)" font-size="21.82" letter-spacing="-2.0" xml:space="preserve"
    ><tspan x="48" y="64"> ▄▄▄  ▄▄▄▄  ▄▄▄▄▄ ▄▄  ▄▄      ▄▄▄  ▄▄ ▄▄ ▄▄▄▄   ▄▄▄▄   ▄▄▄   ▄▄▄▄ </tspan
    ><tspan x="48" dy="21.82">██ ██ ██ ██ ██▄▄  ███▄██ ▄▄▄ ██ ▀▀ ██ ██ ██ ██ ██▄▄▄  ██ ██  ██ ██</tspan
    ><tspan x="48" dy="21.82">▀█▄█▀ ██▀▀  ██▄▄▄ ██ ▀██     ▀█▄█▀ ▀█▄█▀ ██▀█▄ ▄▄▄█▀  ▀█▄█▀  ██▀█▄</tspan
  ></text>
  <rect class="sweep" x="48" y="139" width="732" height="2" fill="#808080" opacity="0.45"/>
  <g clip-path="url(#rc_rule)"><rect class="scan" x="-102" y="139" width="150" height="2" fill="url(#scang_rule)"/></g>
  <text class="cursor" fill="#ffffff" x="360" y="165" font-size="15" xml:space="preserve">▌</text>
  <text fill="#c9c9c9" x="48" y="165" font-size="15" xml:space="preserve">cursor pro models, inside opencode</text>
</svg>
